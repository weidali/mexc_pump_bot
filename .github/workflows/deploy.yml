name: Deploy to Server

on:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            DEPLOY_PATH="/var/www/u1229058/data/tmp/pump-bot"
            REPO="https://github.com/weidali/mexc_pump_bot.git"
            BRANCH="master"

            # ── 1. Клонируем если ещё нет git репо ──────────
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo ">>> Клонируем репозиторий..."
              rm -rf "$DEPLOY_PATH"
              git clone -b "$BRANCH" "$REPO" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"

            # ── 2. Подтягиваем изменения ─────────────────────
            echo ">>> Обновляем код..."
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            # ── 3. Создаём venv если нет, обновляем зависимости
            echo ">>> Обновляем зависимости..."
            if [ ! -d "$DEPLOY_PATH/venv" ]; then
              /usr/bin/python3.12 -m venv "$DEPLOY_PATH/venv"
            fi
            "$DEPLOY_PATH/venv/bin/pip" install --quiet --upgrade pip
            "$DEPLOY_PATH/venv/bin/pip" install --quiet -r "$DEPLOY_PATH/requirements.txt"

            # ── 4. Пишем .env из GitHub Secrets ──────────────
            echo ">>> Обновляем .env..."
            cat > "$DEPLOY_PATH/.env" << ENVEOF
            TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}
            MEXC_API_KEY=${{ secrets.MEXC_API_KEY }}
            MEXC_SECRET=${{ secrets.MEXC_SECRET }}
            ENVEOF

            # ── 5. Перезапускаем бота ─────────────────────────
            echo ">>> Перезапускаем бота..."
            "$DEPLOY_PATH/start.sh"

            echo ">>> Деплой завершён успешно!"